<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artificial Life Ecosystem Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h2>Life Simulation</h2>
        <div class="control-group">
            <label for="population">Initial Population: <span id="population-val">1000</span></label>
            <input type="range" id="population" min="100" max="10000" step="100" value="1000">
        </div>
        <div class="control-group">
            <label for="infection-prob">Infection Probability: <span id="infection-prob-val">10%</span></label>
            <input type="range" id="infection-prob" min="0" max="100" step="1" value="10">
        </div>
        <div class="control-group">
            <label for="reproduction-prob">Reproduction Probability: <span id="reproduction-prob-val">5%</span></label>
            <input type="range" id="reproduction-prob" min="0" max="100" step="1" value="5">
        </div>
        <div class="control-group">
            <label for="agent-speed">Agent Speed: <span id="agent-speed-val">2</span></label>
            <input type="range" id="agent-speed" min="0.1" max="10" step="0.1" value="2">
        </div>
        <button id="restart-btn">Restart / Apply</button>

        <div class="stats">
            <p>Living Entities: <span id="living-entities">0</span></p>
            <p>FPS: <span id="fps">0</span></p>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="color-box healthy"></span> Healthy</div>
            <div class="legend-item"><span class="color-box infected"></span> Infected</div>
            <div class="legend-item"><span class="color-box immune"></span> Immune</div>
        </div>
    </div>
    <div id="canvas-container">
        <canvas id="sim-canvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
